events {
    worker_connections 1024;
}

http {
    upstream app {
        server app:3000;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

    server {
        listen 80;
        server_name lessonlearnt.pepzona7.my.id;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name lessonlearnt.pepzona7.my.id;

        ssl_certificate /etc/letsencrypt/live/lessonlearnt.pepzona7.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lessonlearnt.pepzona7.my.id/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ============ SECURITY HEADERS ============
        # HSTS — enforce HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # Prevent clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Prevent MIME sniffing
        add_header X-Content-Type-Options "nosniff" always;
        # Disable legacy XSS auditor (can be exploited, rely on CSP instead)
        add_header X-XSS-Protection "0" always;
        # Control referrer information
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Permissions Policy — restrict browser APIs
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), browsing-topics=(), interest-cohort=()" always;
        # CSP — allow self + inline styles (Next.js needs it) + R2/S3 images + CDN
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

        # ============ ROUTES ============

        # Upload — buffer full body, disable chunked transfer
        location /api/files/upload-direct {
            limit_req zone=upload burst=10 nodelay;
            client_max_body_size 250m;
            proxy_request_buffering on;
            proxy_buffering on;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_pass http://app;
        }

        location /api/files/upload-confirm {
            client_max_body_size 10m;
            proxy_request_buffering on;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://app;
        }

        location /api/files/ {
            limit_req zone=api burst=50 nodelay;
            client_max_body_size 250m;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_pass http://app;
        }

        # CORS — explicit allowlist for API routes
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            
            # CORS headers — only allow same origin
            add_header Access-Control-Allow-Origin "https://lessonlearnt.pepzona7.my.id" always;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Cookie" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;
            
            # Handle OPTIONS preflight
            if ($request_method = OPTIONS) {
                return 204;
            }
            
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 1g;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}
